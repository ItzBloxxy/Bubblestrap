name: Update Download Chart
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  update-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Font
        run: |
          mkdir -p fonts
          curl -sL -o fonts/Caveat.ttf "https://github.com/google/fonts/raw/main/ofl/caveat/Caveat%5Bwght%5D.ttf"
      - name: Install Libraries
        run: pip install requests pandas matplotlib scipy numpy
      - name: Run Chart Generator
        run: python chart.py
      - name: Save Image to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads.png
          git diff-index --quiet HEAD || git commit -m "chore: update download chart [skip ci]"
          git pull --rebase origin master
          git push
